# Configuration for Demo Redis Enterprise Cluster
# This file contains the configuration for the shared Redis Enterprise cluster
# This cluster serves multiple teams (team1, team2, etc.)

cluster:
  name: demo
  team: platform-team
  datacenter: dc1

namespace: redis-enterprise

redis:
  clusterName: demo-redis-cluster
  nodes: 3
  version: "8.0.10-76"
  certificates:
    # Optional: custom REC certificate secrets.
    # Each secret must exist in redis-enterprise namespace with keys: certificate, key, and name
    # name must match endpoint type: proxy, api, cm, syncer, metrics_exporter
    proxyCertificateSecretName: "proxy-cert-secret"
    apiCertificateSecretName: "api-cert-secret"
    cmCertificateSecretName: "cm-cert-secret"
    syncerCertificateSecretName: "syncer-cert-secret"
    metricsExporterCertificateSecretName: "metrics-exporter-cert-secret"
  servicesRiggerSpec:
    # Optional: set true to create predictable DB services by database name (bdb_name).
    # Recommended when exposing databases via custom Route hosts.
    enabled: true
    databaseServiceType: "cluster_ip"
    serviceNaming: "bdb_name"
  
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  
  persistence:
    enabled: true
    storageClassName: ocs-external-storagecluster-ceph-rbd
    volumeSize: 50Gi

routes:
  ui:
    enabled: true
    # Must match certificate SAN. This cert includes *.redis-demo.example.com.
    host: "ui.redis-demo.example.com"
    tlsTermination: passthrough

monitoring:
  enabled: true
  scrapeInterval: 30s
  scrapeTimeout: 10s

logging:
  sidecar:
    enabled: true
    image: "grafana/alloy:latest"
    lokiEndpoint: "https://logging-loki-gateway-http.openshift-logging.svc:8080/api/logs/v1/application/loki/api/v1/push"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

labels:
  app.kubernetes.io/managed-by: argocd
  gitops: argocd
  cluster: demo

annotations:
  description: "Shared Redis Enterprise Cluster - Demo multi-tenant setup"
