# Team 1 Cache Database - Production Environment

database:
  name: team1-cache
  env: prod
  type: cache

cluster:
  name: demo
  team: team1
  costCenter: CC-TEAM1
  datacenter: dc1

namespace: redis-team1-prod

redis:
  clusterName: demo-redis-cluster
  memorySize: 512MB
  replication: false
  persistence: aofEverySecond
  databasePort: 12002
  tlsMode: enabled
  # Optional mTLS trust store secret names in this namespace.
  # Each secret must contain key: cert
  clientAuthenticationCertificates: []
  evictionPolicy: volatile-lru
  shardCount: 1
  type: redis

route:
  enabled: true
  tlsTermination: passthrough
  # Optional custom Route host (for example: team1-cache-prod.redis-demo.example.com)
  host: ""
  # Optional backend service override. Keep empty unless REC serviceNaming=bdb_name is enabled.
  serviceName: ""

labels:
  app: team1-app
  app.kubernetes.io/managed-by: argocd
  gitops: argocd
  component: cache
  team: team1
  env: prod

annotations:
  description: "Cache database for Team 1 - Production"
