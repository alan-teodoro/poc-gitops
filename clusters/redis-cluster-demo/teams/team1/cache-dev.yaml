# Team 1 Cache Database - Development Environment

database:
  name: team1-cache
  env: dev
  type: cache

cluster:
  name: demo
  team: team1
  costCenter: CC-TEAM1
  datacenter: dc1

namespace: redis-team1-dev

redis:
  clusterName: demo-redis-cluster
  memorySize: 512MB
  replication: false
  persistence: disabled
  databasePort: 12000
  tlsMode: enabled
  # Optional mTLS trust store secret names in this namespace.
  # Each secret must contain key: cert
  clientAuthenticationCertificates:
    - client-cert-secret
  evictionPolicy: volatile-lru
  shardCount: 1
  type: redis

route:
  enabled: true
  tlsTermination: passthrough
  # Optional custom Route host (for example: team1-cache-dev.redis-demo.example.com)
  host: "redis-demo.example.com"
  # Optional backend service override. Keep empty unless REC serviceNaming=bdb_name is enabled.
  serviceName: "team1-cache-dev"

labels:
  app: team1-app
  app.kubernetes.io/managed-by: argocd
  gitops: argocd
  component: cache
  team: team1

annotations:
  description: "Cache database for Team 1 - Development"
