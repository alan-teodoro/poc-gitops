  enabled: true
  tlsTermination: passthrough
  # Optional custom Route host (for example: team1-cache-dev.redis-demo.example.com)
  host: "team1-cache-dev.redis-demo.example.com"
  # Optional backend service override. Keep empty unless REC serviceNaming=bdb_name is enabled.
  serviceName: "team1-cache-dev"

labels:
  app: team1-app
  app.kubernetes.io/managed-by: argocd
  gitops: argocd
  component: cache
  team: team1

annotations:
  description: "Cache database for Team 1 - Development"
