# Team 2 Session Store Database - Development Environment

database:
  name: team2-session
  env: dev
  type: session

cluster:
  name: demo
  team: team2
  costCenter: CC-TEAM2
  datacenter: dc1

namespace: redis-team2-dev

redis:
  clusterName: demo-redis-cluster
  memorySize: 512MB
  replication: false
  persistence: disabled
  databasePort: 12001
  tlsMode: enabled
  # Optional mTLS trust store secret names in this namespace.
  # Each secret must contain key: cert
  clientAuthenticationCertificates: []
  evictionPolicy: volatile-ttl
  shardCount: 1
  type: redis

route:
  enabled: true
  tlsTermination: passthrough
  # Optional custom Route host (for example: team2-session-dev.redis-demo.example.com)
  host: ""
  # Optional backend service override. Keep empty unless REC serviceNaming=bdb_name is enabled.
  serviceName: ""

labels:
  app: team2-app
  app.kubernetes.io/managed-by: argocd
  gitops: argocd
  component: session
  team: team2

annotations:
  description: "Session store database for Team 2 - Development"
