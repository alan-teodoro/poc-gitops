---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-redis-executive-slo
  namespace: openshift-monitoring
  labels:
    grafana_dashboard: '1'
  annotations:
    description: Redis Enterprise Executive SLO Dashboard
data:
  redis-executive-slo.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 95
                  },
                  {
                    "color": "green",
                    "value": 99
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "100 * avg(redis_server_up{cluster=~\"$cluster\", db=~\"$db\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Shard Availability",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 85
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "100 * sum(redis_server_used_memory{cluster=~\"$cluster\", db=~\"$db\"}) / sum(redis_server_maxmemory{cluster=~\"$cluster\", db=~\"$db\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Memory Utilization",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "sum(irate(endpoint_read_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m]) + irate(endpoint_write_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m]) + irate(endpoint_other_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m]))",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Current Throughput",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "(sum(irate(endpoint_read_requests_latency_histogram_sum{cluster=~\"$cluster\", db=~\"$db\"}[1m])) + sum(irate(endpoint_write_requests_latency_histogram_sum{cluster=~\"$cluster\", db=~\"$db\"}[1m])) + sum(irate(endpoint_other_requests_latency_histogram_sum{cluster=~\"$cluster\", db=~\"$db\"}[1m]))) / (sum(irate(endpoint_read_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m])) + sum(irate(endpoint_write_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m])) + sum(irate(endpoint_other_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m]))) / 1000",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Avg Request Latency",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "showPoints": "never"
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "sum by (db) (irate(endpoint_read_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m]) + irate(endpoint_write_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m]) + irate(endpoint_other_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m]))",
              "refId": "A"
            }
          ],
          "title": "Throughput by Database",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "showPoints": "never"
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "((sum by (db)(irate(endpoint_read_requests_latency_histogram_sum{cluster=~\"$cluster\", db=~\"$db\"}[1m])) + sum by (db)(irate(endpoint_write_requests_latency_histogram_sum{cluster=~\"$cluster\", db=~\"$db\"}[1m])) + sum by (db)(irate(endpoint_other_requests_latency_histogram_sum{cluster=~\"$cluster\", db=~\"$db\"}[1m]))) / (sum by (db)(irate(endpoint_read_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m])) + sum by (db)(irate(endpoint_write_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m])) + sum by (db)(irate(endpoint_other_requests{cluster=~\"$cluster\", db=~\"$db\"}[1m])))) / 1000",
              "refId": "A"
            }
          ],
          "title": "Latency by Database",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "showPoints": "never"
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "id": 7,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "sum by (db) (irate(redis_server_evicted_keys{cluster=~\"$cluster\", db=~\"$db\"}[5m]))",
              "refId": "A"
            }
          ],
          "title": "Evictions by Database",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                }
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "id": 8,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "topk(10, sum by (db) (redis_server_used_memory{cluster=~\"$cluster\", db=~\"$db\"}))",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Top Databases by Memory",
          "type": "table"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "redis",
        "enterprise",
        "slo",
        "executive",
        "production"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "All",
              "value": ".*"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "definition": "label_values(redis_server_up,cluster)",
            "includeAll": true,
            "label": "Cluster",
            "multi": true,
            "name": "cluster",
            "query": "label_values(redis_server_up,cluster)",
            "refresh": 2,
            "type": "query",
            "allValue": ".*"
          },
          {
            "current": {
              "selected": false,
              "text": "All",
              "value": ".*"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "definition": "label_values(redis_server_up{cluster=~\"$cluster\"},db)",
            "includeAll": true,
            "label": "Database",
            "multi": true,
            "name": "db",
            "query": "label_values(redis_server_up{cluster=~\"$cluster\"},db)",
            "refresh": 2,
            "type": "query",
            "allValue": ".*"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Redis Enterprise - Executive SLO",
      "uid": "redis-executive-slo",
      "version": 1,
      "weekStart": ""
    }
