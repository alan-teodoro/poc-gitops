---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-redis-logs-debug-label-values
  namespace: openshift-monitoring
  labels:
    grafana_dashboard: '1'
  annotations:
    description: Redis logs debug dashboard using label_values variables
data:
  redis-logs-debug-label-values.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "{kubernetes_namespace_name=~\"$namespace\", kubernetes_pod_name=~\"$pod\", kubernetes_container_name=~\"$container\"} |~ \"$search\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Logs Stream (label_values)",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 12
          },
          "id": 2,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum by (kubernetes_namespace_name) (count_over_time({kubernetes_namespace_name=~\"$namespace\"}[5m]))",
              "instant": true,
              "queryType": "instant",
              "refId": "A"
            }
          ],
          "title": "Namespaces Seen (5m)",
          "type": "table"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "redis",
        "logs",
        "debug",
        "loki",
        "label_values"
      ],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace (label_values)",
            "type": "query",
            "query": "label_values({kubernetes_namespace_name=~\".+\"}, kubernetes_namespace_name)",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "refresh": 1,
            "current": {
              "selected": false,
              "text": "All",
              "value": ".*"
            },
            "datasource": {
              "type": "loki",
              "uid": "${datasource}"
            }
          },
          {
            "name": "pod",
            "label": "Pod (label_values)",
            "type": "query",
            "query": "label_values({kubernetes_namespace_name=~\"$namespace\"}, kubernetes_pod_name)",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "refresh": 1,
            "current": {
              "selected": false,
              "text": "All",
              "value": ".*"
            },
            "datasource": {
              "type": "loki",
              "uid": "${datasource}"
            }
          },
          {
            "name": "container",
            "label": "Container (label_values)",
            "type": "query",
            "query": "label_values({kubernetes_namespace_name=~\"$namespace\", kubernetes_pod_name=~\"$pod\"}, kubernetes_container_name)",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "refresh": 1,
            "current": {
              "selected": false,
              "text": "All",
              "value": ".*"
            },
            "datasource": {
              "type": "loki",
              "uid": "${datasource}"
            }
          },
          {
            "name": "search",
            "label": "Text Search",
            "type": "textbox",
            "query": ".*",
            "current": {
              "selected": true,
              "text": ".*",
              "value": ".*"
            }
          }
        ]
      },
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Redis Logs - Debug Variables (label_values)",
      "uid": "redis-logs-debug-label-values",
      "version": 1,
      "weekStart": ""
    }

---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: redis-logs-debug-label-values
  namespace: openshift-monitoring
  labels:
    app: grafana
    component: dashboard
    datasource: loki
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folder: "Redis Enterprise Logs"
  datasources:
    - inputName: "datasource"
      datasourceName: "Loki (Redis Logs)"
  configMapRef:
    name: grafana-dashboard-redis-logs-debug-label-values
    key: redis-logs-debug-label-values.json

