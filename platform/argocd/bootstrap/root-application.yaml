apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-platform-root
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: redis-platform
    app.kubernetes.io/name: redis-platform-root
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/alan-teodoro/poc-gitops.git
    targetRevision: main
    path: platform/argocd/bootstrap/chart
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
