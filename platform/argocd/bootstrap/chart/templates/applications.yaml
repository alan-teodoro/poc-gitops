{{- range .Values.components }}
{{- if .enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.global.argocdNamespace }}
  labels:
    app.kubernetes.io/managed-by: argocd-root-app
    app.kubernetes.io/part-of: redis-platform
    component-id: {{ .id | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ (.syncWave | default "0") | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .project | default "default" }}
  source:
    repoURL: {{ $.Values.global.repoURL }}
    targetRevision: {{ $.Values.global.targetRevision }}
    path: {{ .path }}
    {{- with .directory }}
    directory:
{{ toYaml . | nindent 6 }}
    {{- end }}
    {{- with .helm }}
    helm:
      {{- with .valueFiles }}
      valueFiles:
{{ toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
  destination:
    server: {{ $.Values.global.destinationServer }}
    namespace: {{ .destinationNamespace | default $.Values.global.argocdNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
      {{- range .syncOptions }}
      - {{ . }}
      {{- end }}
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  {{- with .ignoreDifferences }}
  ignoreDifferences:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
