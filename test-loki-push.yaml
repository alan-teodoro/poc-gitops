apiVersion: v1
kind: Pod
metadata:
  name: test-loki-push
  namespace: redis-enterprise
spec:
  serviceAccountName: demo-redis-cluster
  restartPolicy: Never
  containers:
  - name: curl
    image: curlimages/curl:latest
    command:
    - sh
    - -c
    - |
      TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
      TS=$(date +%s)000000000
      cat > /tmp/push.json <<EOF
      {"streams":[{"stream":{"job":"teste-manual","source":"alloy"},"values":[["$TS","linha manual para Loki via gateway SUCCESS!"]]}]}
      EOF
      
      echo "=== Fazendo POST no Loki Gateway ==="
      curl -k -i \
        -H "Authorization: Bearer $TOKEN" \
        -H "Content-Type: application/json" \
        -X POST \
        https://logging-loki-gateway-http.openshift-logging.svc:8080/api/logs/v1/application/loki/api/v1/push \
        --data-binary @/tmp/push.json 2>&1 | head -n 20
      
      echo ""
      echo "=== Teste concluído ==="
      sleep 5

