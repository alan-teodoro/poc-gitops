{{- $certs := .Values.redis.certificates }}
{{- if $certs.createSecrets }}
{{- $certPem := required "redis.certificates.certificate is required when redis.certificates.createSecrets=true" $certs.certificate }}
{{- $keyPem := required "redis.certificates.key is required when redis.certificates.createSecrets=true" $certs.key }}
{{- $secretSpecs := list
  (dict "name" $certs.proxyCertificateSecretName "endpoint" "proxy")
  (dict "name" $certs.apiCertificateSecretName "endpoint" "api")
  (dict "name" $certs.cmCertificateSecretName "endpoint" "cm")
  (dict "name" $certs.syncerCertificateSecretName "endpoint" "syncer")
  (dict "name" $certs.metricsExporterCertificateSecretName "endpoint" "metrics_exporter")
}}
{{- range $secretSpecs }}
{{- if .name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app: redis-enterprise
    cluster: {{ $.Values.cluster.name }}
    team: {{ $.Values.cluster.team }}
    component: certificates
type: Opaque
stringData:
  certificate: |-
{{ $certPem | nindent 4 }}
  key: |-
{{ $keyPem | nindent 4 }}
  name: {{ .endpoint | quote }}
---
{{- end }}
{{- end }}
{{- end }}
