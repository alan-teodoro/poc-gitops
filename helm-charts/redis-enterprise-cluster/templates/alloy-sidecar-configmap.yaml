{{- if .Values.logging.sidecar.enabled }}
---
# Grafana Alloy Sidecar Configuration for Redis Enterprise Internal Logs
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-sidecar-config
  namespace: {{ .Values.namespace }}
  labels:
    app: redis-enterprise
    component: logging
    cluster: {{ .Values.cluster.name }}
data:
  config.alloy: |
    // Redis Enterprise Internal Logs Collection
    // Collects logs from /var/opt/redislabs/log/ and sends to Loki

    // Expand all Redis Enterprise internal log files
    local.file_match "redis_internal_logs" {
      path_targets = [
        {
          __path__ = "/var/opt/redislabs/log/*.log",
        },
      ]
      sync_period = "10s"
    }

    // Tail all matched log files
    loki.source.file "redis_internal_logs" {
      targets = local.file_match.redis_internal_logs.targets
      forward_to    = [loki.process.add_labels.receiver]
      tail_from_end = true
    }

    // Add log metadata labels (job/log_type) and cluster/namespace labels
    loki.process "add_labels" {
      forward_to = [loki.write.loki_gateway.receiver]

      stage.static_labels {
        values = {
          job                       = "redis-enterprise",
          log_type                  = "redis-enterprise-internal",
          cluster                   = "{{ .Values.cluster.name }}",
          namespace                 = "{{ .Values.namespace }}",
          kubernetes_namespace_name = "{{ .Values.namespace }}",
        }
      }
    }

    // Write to Loki gateway
    loki.write "loki_gateway" {
      endpoint {
        url = "{{ .Values.logging.sidecar.lokiEndpoint }}"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }

        // ESSENTIAL for OpenShift Logging/Observatorium multi-tenant gateway
        headers = {
          "X-Scope-OrgID" = "application",
        }
      }
    }
{{- end }}
