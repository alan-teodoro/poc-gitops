{{- if .Values.logging.sidecar.enabled }}
---
# Grafana Alloy Sidecar Configuration for Redis Enterprise Internal Logs
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-sidecar-config
  namespace: {{ .Values.namespace }}
  labels:
    app: redis-enterprise
    component: logging
    cluster: {{ .Values.cluster.name }}
data:
  config.alloy: |
    // SIMPLIFIED TEST: Only one specific test file
    // Testing basic Alloy -> Loki pipeline

    // Read ONLY the test file
    loki.source.file "test_file" {
      targets = [
        {
          __path__ = "/tmp/alloy-simple-test.log",
          job      = "alloy-simple-test",
        },
      ]
      forward_to    = [loki.write.loki_gateway.receiver]
      tail_from_end = false  // Read from beginning
    }

    // Write to Loki gateway
    loki.write "loki_gateway" {
      endpoint {
        url = "https://logging-loki-gateway-http.openshift-logging.svc:8080/api/logs/v1/application/loki/api/v1/push"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }

        // ESSENTIAL for OpenShift Logging/Observatorium multi-tenant gateway
        headers = {
          "X-Scope-OrgID" = "application",
        }
      }
    }
{{- end }}

